<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avilosoamaze — Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0d0d12;
            --bg-card: #16161d;
            --accent: #e63946;
            --accent-glow: rgba(230, 57, 70, 0.35);
            --text: #e8e8ec;
            --text-muted: #8b8b9a;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 1100px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 28px var(--accent-glow); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 600;
            color: white;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            margin-top: 0.25rem;
        }

        .stream-wrapper {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
        }

        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .embed-label {
            padding: 0.75rem 1rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .stream-wrapper {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="live-badge">LIVE</div>
        <h1>avilosoamaze</h1>
        <p>Watch the stream</p>
    </header>

    <main class="stream-wrapper">
        <div class="embed-container">
            <iframe
                id="yt-embed"
                title="avilosoamaze — YouTube Live"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>
        <p id="embed-label" class="embed-label"></p>
    </main>

    <footer class="footer">
        <a href="https://youtube.com/avilosoamaze/live" target="_blank" rel="noopener">Watch on YouTube</a> · Stream powered by YouTube
    </footer>

    <script>
        (function () {
            var CHANNEL_ID = 'UC-BfhcANk1t77i0F_qQPp9gD';
            var LIVE_PAGE_URL = 'https://www.youtube.com/avilosoamaze/live';
            var RSS_URL = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID;
            var CORS_PROXY = 'https://api.allorigins.win/raw?url=';
            var iframe = document.getElementById('yt-embed');
            var label = document.getElementById('embed-label');

            function setEmbed(url, isLive) {
                iframe.src = url;
                label.textContent = isLive ? 'Live now' : 'Latest upload (stream is offline)';
                label.style.display = 'block';
            }

            function getLatestVideoId(cb) {
                var req = new XMLHttpRequest();
                req.open('GET', CORS_PROXY + encodeURIComponent(RSS_URL), true);
                req.onload = function () {
                    var id = null;
                    if (req.status === 200) {
                        var match = req.responseText.match(/<yt:videoId>([^<]+)<\/yt:videoId>/);
                        if (match) id = match[1];
                    }
                    cb(id);
                };
                req.onerror = function () { cb(null); };
                req.send();
            }

            function isStreamLive(cb) {
                var req = new XMLHttpRequest();
                req.open('GET', CORS_PROXY + encodeURIComponent(LIVE_PAGE_URL), true);
                req.onload = function () {
                    if (req.status !== 200) {
                        return cb(false);
                    }
                    var html = req.responseText;
                    var offline = /LIVE_STREAM_OFFLINE|"liveStreamability":\s*\{[^}]*"status":\s*"LIVE_STREAM_OFFLINE"|Stream is offline|This stream is offline/i.test(html);
                    cb(!offline);
                };
                req.onerror = function () { cb(false); };
                req.send();
            }

            isStreamLive(function (live) {
                if (live) {
                    setEmbed('https://www.youtube.com/embed/live_stream?channel=' + CHANNEL_ID, true);
                } else {
                    getLatestVideoId(function (videoId) {
                        if (videoId) {
                            setEmbed('https://www.youtube.com/embed/' + videoId, false);
                        } else {
                            setEmbed('https://www.youtube.com/embed/live_stream?channel=' + CHANNEL_ID, true);
                        }
                    });
                }
            });
        })();
    </script>
</body>
</html>
