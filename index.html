<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avilosoamaze — Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0d0d12;
            --bg-card: #16161d;
            --accent: #e63946;
            --accent-glow: rgba(230, 57, 70, 0.35);
            --text: #e8e8ec;
            --text-muted: #8b8b9a;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 1100px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 28px var(--accent-glow); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 600;
            color: white;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            margin-top: 0.25rem;
        }

        .stream-wrapper {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
        }

        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .stream-wrapper {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="live-badge">LIVE</div>
        <h1>avilosoamaze</h1>
        <p>Watch the stream</p>
    </header>

    <main class="stream-wrapper">
        <div class="embed-container">
            <iframe
                src="https://www.youtube.com/embed/DQkmqwSB_08"
                title="avilosoamaze — YouTube"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>
    </main>

    <footer class="footer">
        <a href="https://youtube.com/avilosoamaze/live" target="_blank" rel="noopener">Watch on YouTube</a> · Stream powered by YouTube
    </footer>
</body>
</html>
